apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-failure-demo
  namespace: k8s-troubleshooting-lab
  labels:
    scenario: probe-failure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: probe-failure-demo
  template:
    metadata:
      labels:
        app: probe-failure-demo
        scenario: probe-failure
    spec:
      containers:
        - name: app
          image: hashicorp/http-echo:1.0
          args:
            - "-listen=:8080"
            - "-text=ok"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
