apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloopbackoff-demo
  namespace: k8s-troubleshooting-lab
  labels:
    scenario: crashloopbackoff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloopbackoff-demo
  template:
    metadata:
      labels:
        app: crashloopbackoff-demo
        scenario: crashloopbackoff
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "echo 'iniciando app'; sleep 2; exit 1"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
